name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version-file: .nvmrc

      - name: Install
        run: npm ci

      # `pretest:unit` builds dist first — the unit tests import from it and the
      # fixtures' verify-bundle greps it, so the build is shared by both phases.
      - name: Unit tests
        run: npm run test:unit

      # Each fixture is its own npm project that depends on this package via
      # "file:../../..", so its `npm i` symlinks the local dist/ in and builds
      # against it — the same resolution CloudCannon uses. Proves the packaged
      # exports/bin work, not just the source.
      - name: Integration tests
        run: npm run test:integration
