name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache: npm
          node-version-file: .nvmrc

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Build first: unit tests import from dist/, and verify-bundle greps it.
      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      # Fixtures run `npm i` (proving the real file: install path) then build
      # offline and assert. This is also the end-to-end check of the local link.
      - name: Integration tests
        run: npm run test:integration
