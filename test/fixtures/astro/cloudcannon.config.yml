source: test/fixtures/astro
paths:
  static: public
  uploads: public

# The scenario pages, so they show up in the Collection browser and open in the
# Visual Editor for the smoke test. Markdown files piped through Layout.astro;
# `[slug]` is the filename (index → "/") under the `always` trailing slash. The
# curated fixture set isn't editor-extended, so file actions are off; the body's
# data-rosey regions are edited live by RCC, the title via the input below.
collections_config:
  pages:
    path: src/pages
    glob:
      - "*.md"
    url: "/[slug]/"
    name: Pages
    icon: article
    disable_add: true
    disable_add_folder: true
    disable_file_actions: true
    _enabled_editors:
      - visual
    _inputs:
      layout:
        hidden: true
      title:
        type: text

# RCC reads these to discover the locale files and expose the switcher.
# write-locales warns during the build if a locales_<code> entry is missing.
data_config:
  locales_fr:
    path: rosey/locales/fr.json
  locales_ar:
    path: rosey/locales/ar.json

# Full rich-text toolbar for the Markdown scenario. The Visual-Editor check
# confirms every one of these buttons renders on the markdown (block) editable.
_editables:
  content:
    bold: true
    italic: true
    underline: true
    strike: true
    subscript: true
    superscript: true
    code: true
    format: p h2 h3 h4
    blockquote: true
    bulletedlist: true
    numberedlist: true
    indent: true
    outdent: true
    link: true
    image: true
    table: true
    horizontalrule: true
    removeformat: true
    copyformatting: true
    undo: true
    redo: true
