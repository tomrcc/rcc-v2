source: test/fixtures/eleventy-bookshop
paths:
  static: ""

# The Bookshop page, so it shows up in the Collection browser and opens in the
# Visual Editor for the smoke test. Markdown file piped through _includes/
# base.liquid; `[slug]` is the filename (index → "/"), matching Eleventy's output.
# Editing happens live via the data-rosey regions the Bookshop component emits,
# the title via the input below; the curated fixture isn't editor-extended.
collections_config:
  pages:
    path: src
    glob:
      - "*.md"
    url: "/[slug]/"
    name: Pages
    icon: article
    disable_add: true
    disable_add_folder: true
    disable_file_actions: true
    _enabled_editors:
      - visual
    _inputs:
      layout:
        hidden: true
      title:
        type: text

# RCC reads these to discover the locale files and expose the switcher.
data_config:
  locales_fr:
    path: rosey/locales/fr.json
  locales_ar:
    path: rosey/locales/ar.json
